<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Language" content="es">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmaCly - Register user</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="shortcut icon" href="iconoNavegador.ico" />
  <script src="js/registrarUsuario.js"></script>
</head>
<body class="pantalla-login">

  <header class="app-header">
    <div class="app-header__inner">
      <img id="logo" src="logoSmaCly2.png" alt="SmaCly logo"/>

      <div class="app-header__text">
        <h1 id="title">SmaCly : Design your smart contract using Blockly</h1>
      </div>

      <div class="app-header__actions">
      </div>
    </div>
  </header>

  <main class="pantalla-centro">
    <section class="tarjeta">
      <h2 class="tarjeta-titulo">Create an account</h2>
      <p class="tarjeta-texto">Sign up to start using SmaCly</p>

      <form id="registerForm" class="formu">
        <div class="campo">
          <label for="user">User account name</label>
          <input type="text" id="user" name="user" placeholder="Insert here the user account name" required>
        </div>

        <div class="campo">
          <label for="nombre">User personal name</label>
          <input type="text" id="nombre" name="nombre" placeholder="Insert here your personal name">
        </div>

        <div class="campo">
          <label for="apellido">User surname</label>
          <input type="text" id="apellido" name="apellido" placeholder="Insert here your surname">
        </div>

         <div class="campo">
          <label for="institucion">Institution</label>
          <input type="text" id="institucion" name="institucion" placeholder="University, enterprise ...">
        </div>

        <div class="campo">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="user@email.com" required>
        </div>

        <div class="campo">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Insert here your password" required>
        </div>

         <div class="campo">
          <label for="password">Re-enter password</label>
          <input type="password" id="password2" name="password2" placeholder="Re-enter the password" required>
        </div>

        <button type="submit" class="button boton-grande">Sign up</button>
      </form>
      <p id="mensaje" class="aviso"></p>
      <p class="texto-centro">Do you already have an account?<a href="loginSmaCly.html" class="link">Go to login page</a></p>
    </section>
  </main>
</body>
</html>
