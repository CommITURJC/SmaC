  <script>
    //SCRIPT PARA PODER DESCARGAR LOS ARCHIVOS EN SOLIDITY Y EN VYPER A PARTIR DE LOS ICONOS
    function download(filename, textInput) {
      var element = document.createElement('a');
      element.setAttribute('href', 'data:text/plain;charset=utf-8,' + encodeURIComponent(textInput));
      element.setAttribute('download', filename);
      document.body.appendChild(element);
      element.click();
    }

    async function descargarCodigoSolidityWorkspace(idWorkspace) {
      if (!idWorkspace) {
        mostrarMensajeWorkspaces('The Solidity code could not be downloaded', false);
        return;
      }

      try {
        var response = await fetch('/api/cargarWorkspace', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(idWorkspace)
        });

        if (!response.ok) {
          throw new Error('Error loading the workspace');
        }

        var workspace = await response.json();

        if (!workspace || !workspace.codigoSolidity || workspace.codigoSolidity.trim() === '') {
          mostrarMensajeWorkspaces('This workspace does not have any Solidity code saved', false);
          return;
        }

        var nombreArchivo = 'workspace.sol';

        if (workspace.nombreWorkspace && workspace.nombreWorkspace.trim() !== '') {
          nombreArchivo = workspace.nombreWorkspace.trim() + '.sol';
        }

        download(nombreArchivo, workspace.codigoSolidity);
        mostrarMensajeWorkspaces('Solidity code downloaded successfully', true);

      } catch (e) {
        console.error(e);
        mostrarMensajeWorkspaces('Error downloading the Solidity code', false);
      }
    }

    async function descargarCodigoVyperWorkspace(idWorkspace) {
      if (!idWorkspace) {
        mostrarMensajeWorkspaces('The Vyper code could not be downloaded', false);
        return;
      }

      try {
        var response = await fetch('/api/cargarWorkspace', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify(idWorkspace)
        });

        if (!response.ok) {
          throw new Error('Error loading the workspace');
        }

        var workspace = await response.json();

        if (!workspace || !workspace.codigoVyper || workspace.codigoVyper.trim() === '') {
          mostrarMensajeWorkspaces('This workspace does not have any Vyper code saved', false);
          return;
        }

        var nombreArchivo = 'workspace.vy';

        if (workspace.nombreWorkspace && workspace.nombreWorkspace.trim() !== '') {
          nombreArchivo = workspace.nombreWorkspace.trim() + '.vy';
        }

        download(nombreArchivo, workspace.codigoVyper);
        mostrarMensajeWorkspaces('Vyper code downloaded successfully', true);

      } 
      catch (error) {
        console.error(error);
        mostrarMensajeWorkspaces('Error downloading the Vyper code', false);
      }
    }
  </script>

  <script>
  var paginaActualWorkspace = 1;
  var tamanioPaginaWorkspace = 10;
  var listaWorkspaces = [];
  var listaWorkspacesFiltrados = [];
  var usuarioActualWorkspaces = null;//Para comprobar
  var tablaWorkspacesBody = document.getElementById('tablaWorkspacesBody');
  var resumenPaginacionWorkspaces = document.getElementById('resumenPaginacionWorkspaces');
  var paginaActualWorkspacesTexto = document.getElementById('paginaActualWorkspacesTexto');
  var mensajeWorkspaces = document.getElementById('mensajeWorkspaces');

  function mostrarMensajeWorkspaces(texto, ok) {
    mensajeWorkspaces.textContent = texto;
    if(ok){
      mensajeWorkspaces.className = 'mensaje-panel mensaje-ok';
    } 
    else{
      mensajeWorkspaces.className = 'mensaje-panel mensaje-error';
    }
  }

  function normalizarTexto(_texto) {
    if (_texto == null) {
      return '';
    }

    var texto = String(_texto).toLowerCase().trim();
    return texto;
  }

  function formatearFecha(_valor) {
    if (!_valor) {
      return '-';
    }

    try{
      var fecha = new Date(_valor);
      if(Number.isNaN(fecha.getTime())) {
        return _valor;
      }
      return fecha.toLocaleString('es-ES');
    } 
    catch(error){
      return _valor;
    }
  }


function aplicarFiltrosWorkspaces() {
  var filtroTexto = document.getElementById( 'filtroTextoWorkspace');
  var filtroFecha = document.getElementById(  'filtroFechaWorkspace');
  var filtroTipo = document.getElementById( 'filtroTipoWorkspace');

  var texto = '';

  if(filtroTexto){
    texto = normalizarTexto(filtroTexto.value );
  }
  var fecha = '';
  if (filtroFecha) {
    fecha = filtroFecha.value;
  }
  var tipo = '';
  if (filtroTipo) {
    tipo = filtroTipo.value;
  }

  var nuevaLista = [];

  for (var i = 0;i < listaWorkspaces.length;i++ ) {
    var workspace = listaWorkspaces[i];
    var meter = true;
    //filtro de texto para filtrar por template o workspace
    if (texto !== '') {
      var nombreWorkspace = normalizarTexto( workspace.nombreWorkspace);
      var user = normalizarTexto(workspace.user );
      var email = normalizarTexto(workspace.email);
      if (!nombreWorkspace.includes(texto)  && !user.includes(texto) && !email.includes(texto)) {
        meter = false;
      }
    }
    //FILTRO POR TIPO
    if (meter && tipo !== '') {
      var esPlantilla = workspace.isTemplate === true;
      if (tipo === 'template' && !esPlantilla) {
        meter = false;
      }
      if (tipo === 'workspace' && esPlantilla ) {
        meter = false;
      }
    }

    //Filtro por fecha de actualización
    if(meter && fecha !== '') {
      var fechaWorkspace = new Date( workspace.fechaActualizacion);
      if(Number.isNaN(fechaWorkspace.getTime())){
        meter = false;
      } 
      else{
        var textoFecha = fechaWorkspace.toISOString().slice(0, 10);
        if (textoFecha !== fecha) {
          meter = false;
        }
      }
    }
    if(meter) {
      nuevaLista.push(workspace);
    }
  }

  listaWorkspacesFiltrados =nuevaLista;
  paginaActualWorkspace = 1;
  renderizarTablaWorkspaces();
}


function renderizarTablaWorkspaces() {
  var inicio = (paginaActualWorkspace - 1)* tamanioPaginaWorkspace;
  var fin =inicio + tamanioPaginaWorkspace;
  var tablaHTML = '';
  var i = 0;
  if (listaWorkspacesFiltrados.length === 0) {
    //Ahora la tabla tiene siete columnas porquehemos añadido la columna Type
    tablaWorkspacesBody.innerHTML ='<tr>'+ '<td colspan="7">'+ 'There are no workspaces to display'+ '</td>'+ '</tr>';
  } 
  else{
    for (i = inicio; i < fin && i < listaWorkspacesFiltrados.length;i++){
      var workspace =listaWorkspacesFiltrados[i];
      var nombreWorkspace = '-';
      var user = '-';
      var email = '-';
      if (workspace.nombreWorkspace) {
        nombreWorkspace = workspace.nombreWorkspace;
      }
      if (workspace.user) {
        user = workspace.user;
      }
      if (workspace.email) {
        email = workspace.email;
      }

      //Los workspaces antiguos pueden no tener isTemplate.Solo se considera plantilla cuando su valor es exactamente true.
      var esPlantilla =workspace.isTemplate === true;
      var tipoWorkspace = esPlantilla ? 'Template': 'Workspace';
      var esPropietario = false;
      if ( usuarioActualWorkspaces && usuarioActualWorkspaces.id  && workspace.userId){
        esPropietario = String(usuarioActualWorkspaces.id)=== String(workspace.userId);
      }

      var rolUsuarioActual = '';

      if(usuarioActualWorkspaces && usuarioActualWorkspaces.rol){
        rolUsuarioActual = String(usuarioActualWorkspaces.rol).toUpperCase();
      }
      var esAdmin = rolUsuarioActual === 'ADMIN';//Un ADMIN mantiene las acciones administrativas
      var esProfessor = rolUsuarioActual === 'PROFESSOR';//Un PROFESSOR puede mantener las acciones sobre los workspaces propios y de sus usuarios 
      var esUser =rolUsuarioActual === 'USER';//Un USER solo puede borrar sus propios workspaces. Nunca puede borrar una plantilladel profesor.*/
      var puedeBorrar = false;
      if (esUser) {
        puedeBorrar = esPropietario && !esPlantilla;
      }
      else if (esProfessor || esAdmin) {
        puedeBorrar = true;
      }
      /*
      Texto del botón de carga:
        - Para el alumno (USER) se muestra "Use template"porque el backend le devolverá una copia
        - Para el propietario se muestra "Load template" porque el profesor puede abrir la plantilla original y modificarla
      */
      var textoBotonCarga = 'Load workspace';
      if(esPlantilla  && esUser && !esPropietario){
        textoBotonCarga ='Use template';
      } 
      else if (esPlantilla){
        textoBotonCarga ='Load template';
      }
      var idWorkspace = '';
      if (workspace.id) {
        idWorkspace = String(workspace.id);
      }

      tablaHTML += '<tr>';
      tablaHTML += '<td>'+ escaparHtml(nombreWorkspace) + '</td>';
      tablaHTML +='<td>';
      if(esPlantilla){
        tablaHTML += '<span class="etiqueta-workspace etiqueta-template">'  + 'Template'+ '</span>';
      } 
      else{
        tablaHTML +='<span class="etiqueta-workspace etiqueta-normal">' + 'Workspace'+ '</span>';
      }
      tablaHTML +='</td>';
      tablaHTML += '<td>' + escaparHtml(user)+ '</td>';
      tablaHTML += '<td>' + escaparHtml(email) + '</td>';
      tablaHTML += '<td>' + escaparHtml(formatearFecha(workspace.fechaCreacion))+ '</td>';
      tablaHTML += '<td>'+ escaparHtml(formatearFecha(workspace.fechaActualizacion )) + '</td>';
      tablaHTML += '<td>';
      tablaHTML += '<div class="acciones-tabla">';
      //Botón para cargar un workspace normal o utilizar una plantilla
      if(idWorkspace !== "") {
        tablaHTML +='<button'+ ' type="button"'+ ' class="button boton-secundario"'+ ' onclick="cargarWorkspace(\'' + idWorkspace+ '\')">'+ escaparHtml(textoBotonCarga)+ '</button>';
      }

      //Un USER no verá el botón Delete sobre una plantilla del profesor
      if (idWorkspace !== '' && puedeBorrar) {
        var textoBotonBorrado = esPlantilla ? 'Delete template': 'Delete workspace';
        tablaHTML += '<button'+ ' type="button"' + ' class="button boton-secundario"' + ' onclick="borrarWorkspace(\'' + idWorkspace + '\')">'+ escaparHtml(textoBotonBorrado)+ '</button>';
      }
      if (idWorkspace !== '') {
        tablaHTML +='<img' + ' src="solidity_logo.svg"'+ ' class="icono_descarga_codigo"'+ ' title="Click to download the Solidity code"'+ ' onclick="descargarCodigoSolidityWorkspace(\''+ idWorkspace + '\')">';
        tablaHTML +='<img' + ' src="Vyper.svg"' + ' class="icono_descarga_codigo"'+ ' title="Click to download the Vyper code"'+ ' onclick="descargarCodigoVyperWorkspace(\''+ idWorkspace+ '\')">';
      }

      tablaHTML += '</div>';
      tablaHTML += '</td>';
      tablaHTML += '</tr>';
    }

    tablaWorkspacesBody.innerHTML = tablaHTML;
  }

  var total =listaWorkspacesFiltrados.length;
  var totalPaginas = Math.ceil(total / tamanioPaginaWorkspace);
  if(totalPaginas < 1) {
    totalPaginas = 1;
  }
  if(paginaActualWorkspace > totalPaginas){
    paginaActualWorkspace = totalPaginas;
  }
  if(total === 0) {
    resumenPaginacionWorkspaces.textContent ='Showing 0 workspaces';

  } 
  else{
    resumenPaginacionWorkspaces.textContent ='Showing '+ (inicio + 1) + '-' + Math.min(fin, total) + ' of '+ total+ ' workspaces';
  }

  paginaActualWorkspacesTexto.textContent ='Page '+ paginaActualWorkspace + ' of ' + totalPaginas;
  if(paginaActualWorkspace <= 1){
    document.getElementById('paginaAnteriorWorkspacesBtn').disabled = true;
  } 
  else{
    document.getElementById('paginaAnteriorWorkspacesBtn').disabled = false;
  }

  if(paginaActualWorkspace>= totalPaginas){
    document.getElementById('paginaSiguienteWorkspacesBtn').disabled = true;
  } 
  else{
    document.getElementById('paginaSiguienteWorkspacesBtn') .disabled = false;
  }
}


  /*
  DESCRIPCIÓN: Obtiene los datos del usuario autenticado(ID, rol y si es propietario de un workspace)
  */
  async function cargarUsuarioActualWorkspaces() {
    try{
      var respuesta = await fetch('/api/miPerfil');
      if(!respuesta.ok) {
        throw new Error('The authenticated user could not be loaded');
      }
      var usuario = await respuesta.json();
      if(usuario){
        usuarioActualWorkspaces = usuario;
      } 
      else{
        usuarioActualWorkspaces = null;
      }
    } 
    catch(error){
      console.error(error);
      usuarioActualWorkspaces = null;
    }
  }

  async function cargarWorkspaces() {
    try {
      var resultadosWorkspaces = await fetch('/api/workspaces/visibles');

      if (!resultadosWorkspaces.ok) {
        throw new Error('Error loading workspaces');
      }
      var data = await resultadosWorkspaces.json();
      if (Array.isArray(data)){
        listaWorkspaces = data;
      } 
      else{
        listaWorkspaces = [];
      }
      listaWorkspacesFiltrados = [];
      for (var i = 0; i < listaWorkspaces.length; i++) {
        listaWorkspacesFiltrados.push(listaWorkspaces[i]);
      }
      renderizarTablaWorkspaces();
    } 
    catch(error){
      listaWorkspaces = [];
      listaWorkspacesFiltrados = [];
      renderizarTablaWorkspaces();
      mostrarMensajeWorkspaces('The visible workspaces could not be loaded', false);
    }
  }

  function cargarWorkspace(idWorkspace) {
    if (!idWorkspace) {
      mostrarMensajeWorkspaces('The workspace could not be loaded', false);
      return;
    }

    localStorage.setItem('workspaceIdSeleccionado', idWorkspace);
    window.location.href = 'editor.html';
  }

  /*
  PARÁMETRO DE ENTRADA: El id del workspace sobre el que se ha pulsado el botón DELETE ascoaido a este
  DESCRIPCIÓN: Solicita al backend el borrado del workspace
  PARÁMETRO DE SALIDA: Ninguno. Actualiza el mensaje y la tabla de workspaces
  */
  async function borrarWorkspace(idWorkspace) {
    if(!idWorkspace){
      mostrarMensajeWorkspaces('The workspace could not be deleted', false);
      return;
    }
    var confirmar = confirm('Are you sure you want to delete this workspace?');
    if(!confirmar){
      return;
    }

    try{
      var respuesta = await fetch('/api/workspaces/' + encodeURIComponent(idWorkspace), {
        method: 'DELETE'
      });
      var data = await respuesta.json();
      if(data.exito){
        mostrarMensajeWorkspaces(data.mensaje || "Workspace successfully deleted",true);
        if(localStorage.getItem("workspaceIdActual") === idWorkspace){
          localStorage.removeItem("workspaceIdActual");
        }
        if(localStorage.getItem("workspaceIdSeleccionado") === idWorkspace){
          localStorage.removeItem("workspaceIdSeleccionado");
        }
        await cargarWorkspaces();
      } 
      else{
        mostrarMensajeWorkspaces(data.mensaje || 'The workspace could not be deleted', false);
      }
    } 
    catch(error){
      console.error(error);
      mostrarMensajeWorkspaces('Error deleting the workspace', false);
    }
  }

  /*
  PARÁMETRO DE ENTRADA: Ninguno
  DESCRIPCIÓN: Solicita al backend el borrado de todos los workspaces, plantillas y logs relacionados que el usuario autenticado tiene permiso para eliminar
  PARÁMETRO DE SALIDA: Ninguno. Actualiza el mensaje y la tabla de workspaces
  */
  async function borrarTodosWorkspaces() {
    var confirmar = confirm("Are you sure you want to delete all the workspaces and templates you are allowed to manage? Their related logs will also be deleted.");
    if (!confirmar) {
      return;
    }
    var botonBorrarTodos = document.getElementById("borrarTodosWorkspacesBtn");
    var textoOriginal = botonBorrarTodos.textContent;
    botonBorrarTodos.disabled = true;
    botonBorrarTodos.textContent = "Deleting...";
    try {
      var respuesta = await fetch("/api/workspaces", {
        method: "DELETE"
      });
      var data = await respuesta.json();
      if (!respuesta.ok) {
        mostrarMensajeWorkspaces(data.mensaje || "The records could not be deleted",false);
        return;
      }

      if (data.exito) {
        localStorage.removeItem("workspaceIdActual");
        localStorage.removeItem("workspaceIdSeleccionado");
        paginaActualWorkspace = 1;
        mostrarMensajeWorkspaces(data.mensaje || "All permitted records were deleted successfully",true);
        await cargarWorkspaces();
      }
      else {
        mostrarMensajeWorkspaces(data.mensaje || "The records could not be deleted",false);
      }
    }
    catch (error) {
      console.error(error);
      mostrarMensajeWorkspaces("Error deleting all permitted workspace records",false);
    }
    finally {
      botonBorrarTodos.disabled = false;
      botonBorrarTodos.textContent = textoOriginal;
    }
}


  /*DESCRIPCIÓN:Convierte un texto en contenido seguro para mostrarlodentro de la tabla*/
  function escaparHtml(valor) {
    if(valor == null){
      return '';
    }
    return String(valor).replaceAll('&', '&amp;').replaceAll('<', '&lt;') .replaceAll('>', '&gt;').replaceAll('"', '&quot;').replaceAll("'", '&#039;');
  }


  function prepararFiltrosYPaginacion() {
    document.getElementById('filtroTextoWorkspace').addEventListener('input', aplicarFiltrosWorkspaces);
    document.getElementById('filtroFechaWorkspace').addEventListener('change', aplicarFiltrosWorkspaces);
    document.getElementById('filtroTipoWorkspace').addEventListener('change',aplicarFiltrosWorkspaces);
    document.getElementById('tamPaginaWorkspace').addEventListener('change', function (e) {
      tamanioPaginaWorkspace = Number(e.target.value);
      paginaActualWorkspace = 1;
      renderizarTablaWorkspaces();
    });

    document.getElementById('paginaAnteriorWorkspacesBtn').addEventListener('click', function () {
      if (paginaActualWorkspace > 1) {
        paginaActualWorkspace = paginaActualWorkspace - 1;
        renderizarTablaWorkspaces();
      }
    });

    document.getElementById('paginaSiguienteWorkspacesBtn').addEventListener('click', function () {
      var totalPaginas = Math.ceil(listaWorkspacesFiltrados.length / tamanioPaginaWorkspace);

      if (totalPaginas < 1) {
        totalPaginas = 1;
      }

      if (paginaActualWorkspace < totalPaginas) {
        paginaActualWorkspace = paginaActualWorkspace + 1;
        renderizarTablaWorkspaces();
      }
    });
  }

 document.addEventListener("DOMContentLoaded", async function() {
    prepararFiltrosYPaginacion();
    document.getElementById("refrescarWorkspacesBtn").addEventListener("click", cargarWorkspaces);
    document.getElementById("borrarTodosWorkspacesBtn").addEventListener("click", borrarTodosWorkspaces);
    await cargarUsuarioActualWorkspaces();
    await cargarWorkspaces();
  });
</script>
