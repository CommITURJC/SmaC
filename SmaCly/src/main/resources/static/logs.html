  <script src="js/cerrarSesion.js"></script>
  <script>
      /*
      PARÁMETRO DE ENTRADA: El id de la sesión cuyos logs se desean eliminar
      DESCRIPCIÓN: Envía una petición al backend para eliminar todos los logs asociados a una sesión concret
      PARÁMETRO DE SALIDA: Ninguno. Muestra mensajes en pantalla indicando el resultado de la operación
      */
      async function borrarLogsSesion(sessionId) {
      if(!confirm("Are you sure you want to delete all the logs from this session?")){
        return;
      }
      try{
        const respuesta = await fetch('/api/logs/sesion/' + encodeURIComponent(sessionId), {
          method: 'DELETE'
        });
        const data = await respuesta.json();
        if (data.exito) {
          alert("Session logs deleted");
          cargarLogs();
        } 
        else{
          alert(data.mensaje);
        }
      }
      catch (error){
        alert("Error deleting session logs");
      }
    }
  </script>
  <style>
    body.pantalla-logs {
      background: #f3f4f8;
      min-height: 100vh;
      overflow: auto;
    }

    .logs-contenedor {
      width: calc(100% - 60px);
      margin: 28px auto 32px auto;
      background: #f7f7f7;
      padding: 30px;
      box-sizing: border-box;
    }

    .panel-logs {
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,.08);
      padding: 22px;
    }

    .cabecera-tabla {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }
    .acciones-cabecera {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
      margin-left: auto;
    }

    .subtitulo-panel {
      margin-top: -6px;
      color: #58617f;

    }

      margin-bottom: 14px;

    .mensaje-ok {
      color: #188038;
    }

    .mensaje-error {

    }

    .filtros-tabla {
      display: grid;
      grid-template-columns: minmax(240px, 1.4fr) minmax(170px, 1fr) minmax(170px, 1fr) minmax(150px, .9fr);
      gap: 12px;

    }

    .campo {
      margin-bottom: 0;

      flex-direction: column;
      gap: 6px;
    }

    .campo label {

      font-family: 'Saira', sans-serif;
    }

    .campo input,
    .campo select {
      border: 1px solid #cfd7f5;
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 14px;
      background: #fff;
      color: #222;
    }

    .tabla-scroll {
      overflow-x: auto;
      border: 1px solid #e4e8f7;
      border-radius: 12px;
      background: #fff;
    }

    table.tabla-logs {
      width: 100%;
      border-collapse: collapse;
      min-width: 1250px;
    }

    .tabla-logs thead {

    .tabla-logs th,

      padding: 12px 14px;
      text-align: left;
      border-bottom: 1px solid #edf1fb;
      font-size: 14px;
      vertical-align: middle;
    }

    .tabla-logs th {

    .button {

    }

    .boton-secundario {

    }

    .paginacion {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 16px;
      gap: 12px;
      flex-wrap: wrap;
    }

    .paginacion-acciones {
      display: flex;

    }

    .texto-largo {

    .acciones-tabla {
      display: flex;

    .icono_descarga_logs {

    @media (max-width: 1000px) {

    @media (max-width: 700px) {
      .logs-contenedor {
        width: calc(100% - 20px);
        padding: 18px 12px;

  <script>
    var paginaActualLogs = 1;
    var tamanioPaginaLogs = 10;
    var listaLogs = [];
    var listaSesiones = [];
    var listaSesionesFiltradas = [];
    var rolUsuarioActualLogs = "";
    var tablaLogsBody = document.getElementById('tablaLogsBody');
    var resumenPaginacionLogs = document.getElementById('resumenPaginacionLogs');
    var paginaActualLogsTexto = document.getElementById('paginaActualLogsTexto');
    var mensajeLogs = document.getElementById('mensajeLogs');

    function mostrarMensajeLogs(texto, ok) {
      mensajeLogs.textContent = texto;
      if(ok){
        mensajeLogs.className = 'mensaje-panel mensaje-ok';
      } 
      else{
        mensajeLogs.className = 'mensaje-panel mensaje-error';
      }
    }

    function normalizarTexto(_valor) {
      if (_valor == null) {
        return '';
      }
      return String(_valor).toLowerCase().trim();
    }

    function formatearFecha(_valor) {
      if (!_valor) {
        return '-';
      }

      try {
        var fecha = new Date(_valor);

        if (Number.isNaN(fecha.getTime())) {
          return _valor;
        }

        return fecha.toLocaleString('es-ES');
      } 
      catch (errorr) {
        return _valor;
      }
    }

    function obtenerFechaComparable(_valor) {
      if (!_valor) {
        return null;
      }

      try {
        var fecha = new Date(_valor);

        if (Number.isNaN(fecha.getTime())) {
          return null;
        }

        return fecha;
      } 
      catch (error) {
        return null;
      }
    }

    function agruparLogsPorSesion(logs) {
      var grupos = {};
      var i = 0;

      for (i = 0; i < logs.length; i++) {
        var log = logs[i];
        var sessionId = log.sessionId || '';

        if (sessionId === '') {
          sessionId = 'sin_sesion';
        }

        if (!grupos[sessionId]) {
          grupos[sessionId] = {
            sessionId: sessionId,
            user: log.user || '',
            email: log.email || '',
            rol: log.rol || '',
            workspaceName: log.workspaceName || '',
            workspaceId: log.workspaceId || '',
            ultimaFecha: log.fecha || '',
            logs: [],
            cantidadLogs: 0
          };
        }

        grupos[sessionId].logs.push(log);
        grupos[sessionId].cantidadLogs = grupos[sessionId].cantidadLogs + 1;

        if(!grupos[sessionId].user && log.user){
          grupos[sessionId].user = log.user;
        }
        if(!grupos[sessionId].email && log.email) {
          grupos[sessionId].email = log.email;
        }
        if(!grupos[sessionId].rol && log.rol) {
          grupos[sessionId].rol = log.rol;
        }
        if(!grupos[sessionId].workspaceName && log.workspaceName) {
          grupos[sessionId].workspaceName = log.workspaceName;
        }
        if(!grupos[sessionId].workspaceId && log.workspaceId) {
          grupos[sessionId].workspaceId = log.workspaceId;
        }

        var fechaActual = obtenerFechaComparable(log.fecha);
        var fechaUltima = obtenerFechaComparable(grupos[sessionId].ultimaFecha);

        if (fechaActual != null) {
          if (fechaUltima == null || fechaActual > fechaUltima) {
            grupos[sessionId].ultimaFecha = log.fecha;
          }
        }
      }

      var sesiones = [];
      var claves = Object.keys(grupos);
      for (i = 0; i < claves.length; i++) {
        sesiones.push(grupos[claves[i]]);
      }
      sesiones.sort(function (a, b) {
        var fechaA = obtenerFechaComparable(a.ultimaFecha);
        var fechaB = obtenerFechaComparable(b.ultimaFecha);
        if (fechaA == null && fechaB == null) {
          return 0;
        }
        if (fechaA == null) {
          return 1;
        }
        if (fechaB == null) {
          return -1;
        }
        return fechaB - fechaA;
      });

      return sesiones;
    }

    function aplicarFiltrosLogs() {
      var texto = normalizarTexto(document.getElementById('filtroTextoLog').value);
      var rol = document.getElementById('filtroRolLog').value;
      var fecha = document.getElementById('filtroFechaLog').value;
      var nuevaLista = [];
      var i = 0;
      for (i = 0; i < listaSesiones.length; i++) {
        var sesion = listaSesiones[i];
        var meter = true;
        if (texto !== '') {
          var textoSesion = normalizarTexto(sesion.sessionId);
          var textoUsuario = normalizarTexto(sesion.user);
          var textoEmail = normalizarTexto(sesion.email);
          var textoRol = normalizarTexto(sesion.rol);
          var textoNombreWorkspace = normalizarTexto(sesion.workspaceName);
          var textoWorkspace = normalizarTexto(sesion.workspaceId);

          if (!textoSesion.includes(texto) &&
              !textoUsuario.includes(texto) &&
              !textoEmail.includes(texto) &&
              !textoRol.includes(texto) &&
              !textoNombreWorkspace.includes(texto) &&
              !textoWorkspace.includes(texto)) {
            meter = false;
          }
        }

        if (meter && rol !== '') {
          if (sesion.rol !== rol) {
            meter = false;
          }
        }

        if (meter && fecha !== '') {
          try {
            var fechaSesion = new Date(sesion.ultimaFecha);
            var textoFecha = fechaSesion.toISOString().slice(0, 10);

            if (textoFecha !== fecha) {
              meter = false;
            }
          } 
          catch (error) {
            meter = false;
          }
        }
        if (meter) {
          nuevaLista.push(sesion);
        }
      }

      listaSesionesFiltradas = nuevaLista;
      paginaActualLogs = 1;
      renderizarTablaLogs();
    }

    function renderizarTablaLogs() {
      var inicio = (paginaActualLogs - 1) * tamanioPaginaLogs;
      var fin = inicio + tamanioPaginaLogs;
      var tablaHTML_logs = '';
      var i = 0;
      if(listaSesionesFiltradas.length === 0) {
        tablaLogsBody.innerHTML = '<tr><td colspan="9">There are no log sessions to display</td></tr>';
      } 
      else{
        for(i = inicio; i < fin && i < listaSesionesFiltradas.length; i++){
          var sesion = listaSesionesFiltradas[i];
          tablaHTML_logs += '<tr>';
          tablaHTML_logs += '<td class="texto-largo" title="' + (sesion.sessionId || '-') + '">' + (sesion.sessionId || '-') + '</td>';
          tablaHTML_logs += '<td>' + (sesion.user || '-') + '</td>';
          tablaHTML_logs += '<td>' + (sesion.email || '-') + '</td>';
          tablaHTML_logs += '<td>' + (sesion.rol || '-') + '</td>';
          tablaHTML_logs += '<td class="texto-largo" title="' + (sesion.workspaceName || '-') + '">' + (sesion.workspaceName || '-') + '</td>';
          tablaHTML_logs += '<td class="texto-largo" title="' + (sesion.workspaceId || '-') + '">' + (sesion.workspaceId || '-') + '</td>';
          tablaHTML_logs += '<td>' + formatearFecha(sesion.ultimaFecha) + '</td>';
          tablaHTML_logs += '<td>' + sesion.cantidadLogs + '</td>';
          tablaHTML_logs += '<td>';
          tablaHTML_logs += '<div class="acciones-tabla">';
          tablaHTML_logs += '<img src="json.png" class="icono_descarga_logs" title="Download session logs" onclick="descargarLogsSesion(\'' + sesion.sessionId + '\')">';
          if (rolUsuarioActualLogs === "PROFESSOR" || rolUsuarioActualLogs === "ADMIN") {
            tablaHTML_logs +='<button type="button" class="button boton-secundario" ' +'onclick="borrarLogsSesion(\'' +sesion.sessionId +'\')">Delete</button>';
          }
          tablaHTML_logs += '</div>';
          tablaHTML_logs += '</td>';
          tablaHTML_logs += '</tr>';
        }
        tablaLogsBody.innerHTML = tablaHTML_logs;
      }
      var total = listaSesionesFiltradas.length;
     var totalPaginas = Math.ceil(total / tamanioPaginaLogs);

      if (totalPaginas < 1){
        totalPaginas = 1;
      }
      if(paginaActualLogs > totalPaginas){
        paginaActualLogs = totalPaginas;
      }
      if(total === 0){
        resumenPaginacionLogs.textContent = 'Showing 0 sessions';
      } 
      else{
        resumenPaginacionLogs.textContent = 'Showing ' + (inicio + 1) + '-' + Math.min(fin, total) + ' de ' + total + ' sessions';
      }
      paginaActualLogsTexto.textContent = 'Page ' + paginaActualLogs + ' de ' + totalPaginas;
      document.getElementById('paginaAnteriorLogsBtn').disabled = paginaActualLogs <= 1;
      document.getElementById('paginaSiguienteLogsBtn').disabled = paginaActualLogs >= totalPaginas;
    }

    function descargarTextoComoArchivo(nombreArchivo, contenido) {
      var element = document.createElement('a');
      element.setAttribute('href', 'data:text/plain;charset=utf-8,' + encodeURIComponent(contenido));
      element.setAttribute('download', nombreArchivo);
      document.body.appendChild(element);
      element.click();
      document.body.removeChild(element);
    }

    function descargarLogsSesion(sessionId) {
      var i = 0;
      var sesion = null;

      for (i = 0; i < listaSesiones.length; i++) {
        if (listaSesiones[i].sessionId === sessionId) {
          sesion = listaSesiones[i];
          break;
        }
      }

      if (sesion == null) {
        mostrarMensajeLogs('The log session was not found', false);
        return;
      }

      var nombreArchivo = 'logs_' + sessionId + '.json';
      var contenido = JSON.stringify(sesion.logs, null, 2);

      descargarTextoComoArchivo(nombreArchivo, contenido);
      mostrarMensajeLogs('Logs downloaded successfully', true);
    }

    async function cargarLogs() {
      try {
        var respuesta = await fetch('/api/logs/mostrarLogs');
        if (!respuesta.ok) {
          throw new Error('Error loading logs');
        }
        var data = await respuesta.json();
        if (Array.isArray(data)) {
          listaLogs = data;
        } 
        else {
          listaLogs = [];
        }

        listaSesiones = agruparLogsPorSesion(listaLogs);
        listaSesionesFiltradas = [];

        for (var i = 0; i < listaSesiones.length; i++) {
          listaSesionesFiltradas.push(listaSesiones[i]);
        }
        renderizarTablaLogs();
      } 
      catch (error) {
        listaLogs = [];
        listaSesiones = [];
        listaSesionesFiltradas = [];
        renderizarTablaLogs();
        mostrarMensajeLogs('The visible logs could not be loaded', false);
      }
    }

    /*
    PARÁMETRO DE ENTRADA: Ninguno
    DESCRIPCIÓN: Obtiene el rol autenticado y muestra las acciones de borrado únicamente a PROFESSOR y ADMIN
    PARÁMETRO DE SALIDA: Ninguno
    */
    async function configurarBotonBorradoMasivoLogs() {
      var boton = document.getElementById("borrarTodosLogsBtn");
      rolUsuarioActualLogs = "";
      if (boton) {
        boton.style.display = "none";
      }

      try {
        var respuesta = await fetch("/api/miPerfil");
        if (!respuesta.ok) {
          return;
        }

        var usuario = await respuesta.json();
        rolUsuarioActualLogs = String(usuario.rol || "").toUpperCase();
        if(boton && (rolUsuarioActualLogs === "PROFESSOR" ||rolUsuarioActualLogs === "ADMIN")) {
          boton.style.display = "inline-block";
        }
      }
      catch (error) {
        console.error("The authenticated user role could not be loaded",error);
      }
    }


  /*
  PARÁMETRO DE ENTRADA: Ninguno
  DESCRIPCIÓN: Solicita al backend el borrado de todos los logs que el usuario autenticado tiene permiso para gestionar
  PARÁMETRO DE SALIDA: Ninguno
  */
  async function borrarTodosLogsPermitidos() {
      var confirmar = confirm("Are you sure you want to delete all the log records you are allowed to manage?");
      if (!confirmar) {
        return;
      }
      var boton = document.getElementById("borrarTodosLogsBtn");
      if (!boton) {
        mostrarMensajeLogs("The delete button could not be found", false);
        return;
      }

      var textoOriginal = boton.textContent;

      boton.disabled = true;
      boton.textContent = "Deleting...";

      try {
        var respuesta = await fetch("/api/logs", {
          method: "DELETE"
        });
        var data = {};
        try {
          data = await respuesta.json();
        }
        catch (errorJson) {
          data = {};
        }

        if (!respuesta.ok) {
          mostrarMensajeLogs(data.mensaje || "The log records could not be deleted",false);
          return;
        }

        if (!data.exito) {
          mostrarMensajeLogs(data.mensaje || "The log records could not be deleted",false);
          return;
        }
        paginaActualLogs = 1;
        mostrarMensajeLogs(data.mensaje || "All permitted log records were deleted successfully",true);
        await cargarLogs();
      }
      catch (error) {
        console.error(error);
        mostrarMensajeLogs("Error deleting all permitted log records",false);
      }
      finally{
        boton.disabled = false;
        boton.textContent = textoOriginal;
      }
  }

    function prepararFiltrosYPaginacionLogs() {
      document.getElementById('filtroTextoLog').addEventListener('input', aplicarFiltrosLogs);
      document.getElementById('filtroRolLog').addEventListener('change', aplicarFiltrosLogs);
      document.getElementById('filtroFechaLog').addEventListener('change', aplicarFiltrosLogs);

      document.getElementById('tamPaginaLogs').addEventListener('change', function (e) {
        tamanioPaginaLogs = Number(e.target.value);
        paginaActualLogs = 1;
        renderizarTablaLogs();
      });

      document.getElementById('paginaAnteriorLogsBtn').addEventListener('click', function () {
        if (paginaActualLogs > 1) {
          paginaActualLogs = paginaActualLogs - 1;
          renderizarTablaLogs();
        }
      });

      document.getElementById('paginaSiguienteLogsBtn').addEventListener('click', function () {
        var totalPaginas = Math.ceil(listaSesionesFiltradas.length / tamanioPaginaLogs);

        if (totalPaginas < 1) {
          totalPaginas = 1;
        }

        if (paginaActualLogs < totalPaginas) {
          paginaActualLogs = paginaActualLogs + 1;
          renderizarTablaLogs();
        }
      });
    }

   document.addEventListener("DOMContentLoaded", async function() {
    prepararFiltrosYPaginacionLogs();
    var botonRefresh = document.getElementById("refrescarLogsBtn");
    var botonBorrarTodos = document.getElementById("borrarTodosLogsBtn");
    if (botonRefresh) {
      botonRefresh.addEventListener("click", cargarLogs);
    }

    if (botonBorrarTodos) {
      botonBorrarTodos.addEventListener(
        "click",
        borrarTodosLogsPermitidos
      );
    }

    await configurarBotonBorradoMasivoLogs();
    await cargarLogs();
  });
  </script>
</body>
